[tool.mypy]
python_version = "3.14"
strict = true
exclude = "generated_symbols.data.structure.StructureNBT"  # TODO: Fix this.

# --- strict = true already enables the following, but listed explicitly: ---
warn_return_any = true
warn_unused_configs = true
disallow_any_generics = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_unreachable = true
strict_equality = true
extra_checks = true

# --- Extras that `strict` doesn't include ---
disallow_any_unimported = false  # This is just too much.
disallow_any_expr = false        # Too noisy, we also need `Any` sometimes.
disallow_any_explicit = false    # Also very noisy
implicit_reexport = false        # We allow this here, we don't allow it in generated_symbols/*
disallow_any_decorated = true
strict_optional = true
strict_bytes = true

[tool.ruff.lint]
ignore = ["F821"]